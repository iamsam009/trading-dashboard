name: CI – Trading Dashboard Backend

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Type-check ───────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff check
        run: ruff check app/ tests/

      - name: Ruff format check
        run: ruff format --check app/ tests/

      - name: Mypy type-check
        run: mypy app/ --ignore-missing-imports

  # ── Unit tests (no external services) ───────────────
  test-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            -m "not integration" \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: backend/coverage.xml

  # ── Integration tests (Docker services) ─────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trading_user
          POSTGRES_PASSWORD: trading_pass
          POSTGRES_DB: trading_db
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U trading_user -d trading_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations against real PostgreSQL
        env:
          DATABASE_URL: postgresql+asyncpg://trading_user:trading_pass@localhost:5432/trading_db
        run: |
          alembic upgrade head || echo "No migrations yet – continuing"

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://trading_user:trading_pass@localhost:5432/trading_db
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/ \
            -m "integration" \
            --run-integration \
            -v \
            --timeout=30

      - name: Upload integration test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: |
            backend/tests/*.log
            backend/*.log

  # ── Docker build check ──────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy .env.example → .env (for build args)
        run: cp .env.example .env

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Docker Compose smoke test ───────────────────────
  smoke-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Copy .env.example → .env
        run: cp .env.example .env

      - name: Start services
        run: docker compose up -d --wait postgres redis backend

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
            if [ "$status" = "200" ]; then
              echo "✅ Backend healthy after ${i}s"
              exit 0
            fi
            echo "⏳ Waiting for backend... (attempt $i, status=$status)"
            sleep 2
          done
          echo "❌ Backend failed to become healthy"
          docker compose logs backend
          exit 1

      - name: Verify health response body
        run: |
          response=$(curl -s http://localhost:8000/health)
          echo "Health response: $response"
          echo "$response" | grep -q '"status":"ok"' || exit 1

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans