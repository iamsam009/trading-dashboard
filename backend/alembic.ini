# Alembic configuration for async SQLAlchemy migrations.
#
# The ``sqlalchemy.url`` below is a *default* placeholder; the actual URL
# is injected at runtime by ``env.py`` from ``app.config.get_settings()``.
# You can override it via the ``-x sqlalchemy.url=...`` CLI flag.

[alembic]
# path to migration scripts – relative to this file's directory
script_location = alembic

# Template used when generating new revision files
# file_template = %%(rev)s_%%(slug)s

# Max length of characters to apply to the "slug" field
# truncate_slug_length: 40

# Logger level
# level: INFO

# Whether to set sql_mode when connecting to MySQL
# set_sql_mode: True

# Default SQLAlchemy URL (overridden by env.py at runtime)
sqlalchemy.url = postgresql+asyncpg://trading_user:trading_pass@localhost:5432/trading_db

# Controls what ``revision`` does when new migration is created:
# "head" = always stamp the new revision as head
# "merge" = stamp the new revision as a child of both heads
# "branch" = only stamp when a merge is required
# version_path_separator: os

# Pre-processing / post-processing hooks for revision files
# hooks:

[post_write_hooks]
# Format generated migration files with black (if installed)
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S